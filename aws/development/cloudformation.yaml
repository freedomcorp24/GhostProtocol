AWSTemplateFormatVersion: '2010-09-09'
Description: 'GhostProtocol Development Environment - S3 Buckets'

Resources:
  ProfilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ghostprotocol-dev-profiles
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*'
            ExposeHeaders:
              - ETag
              - x-amz-server-side-encryption
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  VaultBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ghostprotocol-dev-vault
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*'
            ExposeHeaders:
              - ETag
              - x-amz-server-side-encryption
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ghostprotocol-dev-media
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*'
            ExposeHeaders:
              - ETag
              - x-amz-server-side-encryption

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Join ['', ['arn:aws:s3:::', !Ref MediaBucket, '/*']]

  AttachmentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: ghostprotocol-dev-attachments
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - PUT
              - POST
              - DELETE
              - HEAD
            AllowedOrigins:
              - '*'
            ExposeHeaders:
              - ETag
              - x-amz-server-side-encryption
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

Outputs:
  ProfilesBucketName:
    Description: Name of the profiles bucket
    Value: !Ref ProfilesBucket
  VaultBucketName:
    Description: Name of the vault bucket
    Value: !Ref VaultBucket
  MediaBucketName:
    Description: Name of the media bucket
    Value: !Ref MediaBucket
  AttachmentsBucketName:
    Description: Name of the attachments bucket
    Value: !Ref AttachmentsBucket
