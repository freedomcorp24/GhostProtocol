server {
    listen 80;
    server_name _;

    # Web client root location
    location / {
        root /home/ubuntu/GhostProtocol/deploy/web/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API routing
    location /api {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Admin panel routing
    location /admin {
        root /home/ubuntu/GhostProtocol/deploy/admin;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }
}
