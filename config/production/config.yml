server:
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

logging:
  level: INFO
  appenders:
    - type: console
    - type: file
      currentLogFilename: /var/log/ghost-protocol/ghost-protocol.log
      archivedLogFilenamePattern: /var/log/ghost-protocol/ghost-protocol-%d.log.gz
      archivedFileCount: 5

ghostProtocolConfiguration:
  authSecret: "${AUTH_SECRET:-your-auth-secret}"
  adminUsername: "${ADMIN_USERNAME:-admin}"
  adminPassword: "${ADMIN_PASSWORD:-admin}"
  
premiumTiers:
  - name: "Free"
    price: 0
    storageLimit: 10737418240 # 10GB in bytes
    features:
      - "Basic messaging"
      - "Basic storage"
  - name: "Premium"
    price: 9.99
    storageLimit: 107374182400 # 100GB in bytes
    features:
      - "Advanced messaging"
      - "Enhanced storage"
      - "Priority support"
  - name: "Enterprise"
    price: 29.99
    storageLimit: 1099511627776 # 1TB in bytes
    features:
      - "Enterprise messaging"
      - "Enterprise storage"
      - "24/7 support"
      - "Custom features"

database:
  driverClass: org.postgresql.Driver
  url: "jdbc:postgresql://${DB_HOST:-localhost}:${DB_PORT:-5432}/${DB_NAME:-ghostprotocol}"
  user: "${DB_USER:-ghostprotocol}"
  password: "${DB_PASSWORD:-ghostprotocol}"
  properties:
    charSet: UTF-8
  maxWaitForConnection: 1s
  validationQuery: "SELECT 1"
  validationQueryTimeout: 3s
  minSize: 8
  maxSize: 32
  checkConnectionWhileIdle: false
  evictionInterval: 10s
  minIdleTime: 1 minute

redis:
  url: "redis://${REDIS_HOST:-localhost}:${REDIS_PORT:-6379}"
  
s3:
  accessKey: "${S3_ACCESS_KEY:-your-access-key}"
  secretKey: "${S3_SECRET_KEY:-your-secret-key}"
  region: "${S3_REGION:-us-west-2}"
  attachmentsBucket: "${S3_ATTACHMENTS_BUCKET:-ghost-protocol-attachments}"
  backupsBucket: "${S3_BACKUPS_BUCKET:-ghost-protocol-backups}"
  premiumStorageBucket: "${S3_PREMIUM_STORAGE_BUCKET:-ghost-protocol-premium-storage}"
  keyManagementBucket: "${S3_KEY_MANAGEMENT_BUCKET:-ghost-protocol-key-management}"
